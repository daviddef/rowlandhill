# XcodeGen spec — the .xcodeproj is generated, not checked in.
# Regenerate after adding files or changing settings:  xcodegen generate
name: Rowland
options:
  bundleIdPrefix: app.rowlandhill
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "L9SAXP2E2W"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "3"

targets:
  Rowland:
    type: application
    platform: iOS
    sources:
      - path: Rowland
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rowlandhill
        INFOPLIST_FILE: Rowland/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Dark mode only in v1 — see CLAUDE.md design system.
        UIUserInterfaceStyle: Dark
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    # Entitlements are deliberately EMPTY for the first TestFlight build.
    # Sign in with Apple, iCloud/CloudKit and Associated Domains are all declared-but-
    # unimplemented (AppState.signIn is a TODO, CollectionStore is UserDefaults, deep links
    # don't navigate). Requesting capabilities the app doesn't use blocks provisioning and
    # forces premature registration of an iCloud container. Re-add each one as it ships.

  RowlandTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RowlandTests
    dependencies:
      - target: Rowland
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rowlandhill.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Rowland:
    build:
      targets:
        Rowland: all
    test:
      targets:
        - RowlandTests
    run:
      config: Debug
