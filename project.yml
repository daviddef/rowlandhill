# XcodeGen spec — the .xcodeproj is generated, not checked in.
# Regenerate after adding files or changing settings:  xcodegen generate
name: Rowland
options:
  bundleIdPrefix: app.rowlandhill
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Rowland:
    type: application
    platform: iOS
    sources:
      - path: Rowland
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rowlandhill
        INFOPLIST_FILE: Rowland/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Dark mode only in v1 — see CLAUDE.md design system.
        UIUserInterfaceStyle: Dark
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: Rowland/Resources/Rowland.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.rowlandhill
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.associated-domains:
          - applinks:rowlandhill.app

  RowlandTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RowlandTests
    dependencies:
      - target: Rowland
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.rowlandhill.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Rowland:
    build:
      targets:
        Rowland: all
    test:
      targets:
        - RowlandTests
    run:
      config: Debug
